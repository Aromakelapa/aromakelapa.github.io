<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="style.css">
	<title>Aromakelapa | Mini Games !</title>
</head>
<body>
	<div class="navbar cf">
		<h1 class="home"><a href="#">Aromakelapa</a></h1>
		<ul>
			<li><a href="#">Flash HP</a></li>
			<li><a href="#">Trik</a></li>
			<li ><a href="#">Config</a></li>
		</ul>
	</div>

	<div class="container">
		<div class="header">
			<h1>Aromakelapa</h1>
			<p>Share Everything i Know</p>
		</div>
		
		<div class="content">
			<div class="matchBox">
				<div class="match">
					<h2>Pertandingan</h2>
					<br>
					<div id="player">Kamu</div><br>
					<div id="kamu">🤝</div><br>
					<div class="vs">VS</div><br>
					<div id="player">romBot</div><br>
					<div id="bot">🤝</div>
					<!--<div id="match"></div>-->
				</div>
				<div class="result">
					<h1>Hasil</h1>
					<br>
					<div id="result">Ayo Main! 😀</div>
				</div>
			</div>

			<div class="choice">
				<div class="option" onclick="pickOption('✊')">✊</div>
				<div class="option" onclick="pickOption('✌')">✌</div>
				<div class="option" onclick="pickOption('🖐')">🖐</div>
			</div>
		</div>

		<div class="footer">
				<p>Copyright <a href="">Aromakelapa</a> 2022.</p>
		</div>
	</div>

	<script>
		// Menangkap pilihan player
	function pickOption(player){
		// console.log("memilih ", player);

		// Menangkap pilihan computer
		var bot = Math.random();

		if(bot < 0.34){
			bot = '✊';
		}
		else if(bot >= 0.34 && bot < 0.67){
			bot = '✌';
		}
		else{
			bot = '🖐';
		}
		// console.log (bot);

		// Peraturan
		// var player = pickOption;
		var hasil = '';

		if (player == bot){
			hasil = 'Wahhh.. Seriii 🤪';
		}
		else if (player == '✊'){
			hasil = (bot == '🖐') ? 'Kamu kalah!😞' : '🎉Kamu menang!🥳';
		}
		else if (player == '🖐'){
			hasil = (bot == '✊') ? '🎉Kamu menang!🥳' : 'Kamu kalah!😞';
		}
		else if (player == '✌'){
			hasil = (bot == '🖐') ? '🎉Kamu menang!🥳' : 'Kamu kalah!😞';
		}
		// console.log('Kamu memilih ' + player + '\nromBot memilih ' + bot +  '\n' + hasil);

		// DOM?
		var kamu = document.getElementById("kamu");
		var romBot = document.getElementById("bot");
		var result = document.getElementById("result");

		kamu.textContent = '';
		romBot.textContent = '...';
		result.textContent = 'Tunggu ya, romBot lagi mikir... 🤔'
		
		setTimeout(() => {
			romBot.textContent = bot;
		},2000);
		setTimeout(() => {
			result.textContent = hasil;
		},2300);

		kamu.textContent = player;
		// romBot.textContent = bot;
		// result.textContent = hasil;
		setTimeout(() => {
			console.log('Kamu memilih ' + player + '\nromBot memilih ' + bot +  '\n' + hasil);
		},2600);
		
		

		// var match = document.getElementById("match");

		// match.textContent = player + 'VS' + bot; 
	}
			// JavaScript code
	function search_animal() {
	    let input = document.getElementById('searchbar').value
	    input=input.toLowerCase();
	    let x = document.getElementsByClassName('article');
	      
	    for (i = 0; i < x.length; i++) { 
	        if (!x[i].innerHTML.toLowerCase().includes(input)) {
	            x[i].style.display="none";
	        }
	        else {
	            x[i].style.display="list-item";                 
	        }
	    }
	}
		</script>
</body>
</html>
